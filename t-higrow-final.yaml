# ==============================================================================
# PROJEKT: Cannabis Monitor (Garten/Indoor)
# HARDWARE: LILYGO T-Higrow ESP32 (V1.1 / DHT11)
# VERSION: 4.6.1
# BESCHREIBUNG:
#  + Automatische Deep-Sleep-Blockierung bei angeschlossenem Ladegerät (> 4.3V)
#  + Dynamischer Temperatur-Offset (-0.1°C im Akkubetrieb / +4.5°C im Netzbetrieb)
#  + Kalibrierung hinzugefügt
#  * Rohwerte werden nun elegant via Intervall-Schleife
#    direkt in die Web-Konsole geloggt.
#  + Traffic-Reduktion: Extrem sauberer Median-Filter (1 Update/Minute via MQTT)
#  + Spam-Schutz für Uhrzeit- und Uptime-Sensoren integriert
#  * ÄNDERUNG (v4.6.0): Event-Driven Kaskade! Template/Text-Sensoren pollen nicht
#    mehr selbst (update_interval: never), sondern werden synchron via "on_value"
#    von den Hardware-Sensoren getriggert. Garantiert Werte im 20s Akku-Fenster!
#  * FEHLERBEHEBUNG (v4.6.1): "Couldn't find ID" Parse-Fehler behoben, indem
#    Updates über C++ Lambdas ausgelöst werden (umgeht die strenge YAML-Reihenfolge).
# ==============================================================================

substitutions:
  # ============================================================================
  # MODUL 1: KONFIGURIERBARE VARIABLEN & SCHWELLENWERTE
  # ============================================================================
  #
  # Netzwerkkonfiguration
  devicename: "t-higrow-garten"
  friendly_name: "Garten Monitor"
  # ============================================================================
  # hier ausschneiden
  # ============================================================================
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  # Trage hier die MAC-Adresse deines Garten-Zugrifffspunktes ein, um den Connect extrem zu beschleunigen (Format: "AA:BB:CC:DD:EE:FF")
  # wifi_bssid: "AA:BB:CC:DD:EE:FF" # Zugangspunkt 1
  # wifi_bssid: "AA:BB:CC:DD:EE:FF" # Zugangspunkt 2
  wifi_bssid: !secret wifi_bssid # Zugangspunkt mit bester Signalstaerke
  manual_static_ip: !secret manual_static_ip
  manual_gateway: !secret manual_gateway
  manual_subnet: !secret manual_subnet
  manual_dns1: !secret manual_dns1
  manual_dns2: !secret manual_dns2
  # neuen Key mit "openssl rand -base64 32" erstellen.
  api_encryption_key: !secret api_encryption_key
  mqtt_broker: !secret mqtt_broker
  # ============================================================================
  # bis hier ausschneiden
  # diesen teil in die neue "secrets.yaml" datei einfügen und durch die
  # jeweils gültigen werte des eigenen Setup ersetzen
  # ============================================================================

  # Hardware & Timing
  sensor_power_pin: "4"
  initial_boot_delay_ms: "20000"
  deep_sleep_duration: "15min"

  # Filter-Logik: 1-Sekunden-Sensoren (Boden, Akku, WLAN)
  # Sammelt 31 Werte, sendet den ersten nach 5s (für Akku), danach alle 60s (Dauerbetrieb)
  med_1s_window: "31"
  med_1s_send_first: "5"
  med_1s_send_every: "60"

  # Filter-Logik: 2-Sekunden-Sensoren (Klima, Licht)
  # Sammelt 15 Werte, sendet den ersten nach 6s (für Akku), danach alle 60s (Dauerbetrieb)
  med_2s_window: "15"
  med_2s_send_first: "3"
  med_2s_send_every: "30"

  # Sensor-Kalibrierung: DHT11
  temp_offset_battery: "-0.1" # Korrektur Sensorenabwärme im Akkubetrieb
  temp_offset_powered: "-4.5" # Erhöhte Korrektur bei dauerhafter Stromversorgung
  temp_min: "-20.0"
  temp_max: "60.0"
  hum_min: "5.0"
  hum_max: "95.0"

  # Rohwert-Kalibrierung: Bodenfeuchte (Spannung in Volt)
  soil_moist_raw_dry: "2.80"  # Median der trockenen Messreihe in der Luft (0%)
  soil_moist_raw_wet: "1.60"  # Median in Wasser (100%)

  # Rohwert-Kalibrierung: Dünger / EC (Spannung in Volt -> Zielwert mS/cm)
  soil_ec_raw_p0: "0.14"      # Rohwert für 0.0 mS/cm Sensor trocken / Regenwasser Minimalwert
  soil_ec_target_p0: "0.0"
  soil_ec_raw_p1: "0.21"      # Rohwert für 0.3 mS/cm Nasse Torferde (sehr nährstoffarm)
  soil_ec_target_p1: "0.3"
  soil_ec_raw_p2: "0.28"      # Rohwert für 0.8 mS/cm Nasse Anzuchterde (leicht gedüngt)
  soil_ec_target_p2: "0.8"
  soil_ec_raw_p3: "0.34"      # Rohwert für 1.5 mS/cm Nasse Gartenerde (optimaler Bereich)
  soil_ec_target_p3: "1.5"
  soil_ec_raw_p4: "0.55"      # Rohwert für 5.0 mS/cm Gesättigte Salzlösung Maximalwert
  soil_ec_target_p4: "5.0"

  # Schwellenwerte: Bodenfeuchte (in %)
  soil_moisture_dry: "30.0"
  soil_moisture_wet: "80.0"

  # Schwellenwerte: Dünger/EC (in mS/cm)
  soil_ec_low: "0.6"
  soil_ec_high: "2.2"

  # Schwellenwerte: VPD (in kPa)
  vpd_low: "0.6"
  vpd_ideal_seed: "0.8"
  vpd_ideal_veg_early: "0.9"
  vpd_ideal_veg_late: "1.1"
  vpd_ideal_flower: "1.6"

  # Schwellenwerte: Licht (in Lux)
  light_night: "15"
  light_seed: "500"
  light_veg: "2500"
  light_flower: "7000"

  # NEU: Globale Variablen für die dynamische Laufzeitanpassung
globals:
  - id: current_temp_offset
    type: float
    restore_value: no
    initial_value: '${temp_offset_battery}'
  - id: is_powered
    type: bool
    restore_value: no
    initial_value: "false"

# ==============================================================================
# MODUL 2: SYSTEM & GRUNDKONFIGURATION
# ==============================================================================
esphome:
  name: ${devicename}
  friendly_name: ${friendly_name}

  on_boot:
    # Hardware-Initialisierung VOR dem I2C-Bus (Priorität 1200)
    - priority: 1200
      then:
        - lambda: |-
            // Pin direkt als Ausgang definieren und Strom einschalten, damit I2C nicht blockiert
            pinMode(${sensor_power_pin}, OUTPUT);
            digitalWrite(${sensor_power_pin}, HIGH);
        # Kurze Stabilisierungszeit für die Hardware (Sensoren)
        - delay: 50ms
    - priority: 1000
      then:
        - lambda: |-
            esp_ota_mark_app_valid_cancel_rollback();
            // Dies signalisiert dem System einen erfolgreichen Start
    # Standard-Verhalten für die ESPHome-interne Status-Aktualisierung
    - priority: 800
      then:
        - switch.turn_on: sensor_power

  # Deep Sleep Logik Schleife aktiviert
  on_loop:
    then:
      # Prüft, ob das Gerät verbunden ist, Deep Sleep erlaubt ist und die Mindestlaufzeit erreicht wurde
      # ÄNDERUNG: Deep Sleep wird jetzt zusätzlich blockiert, wenn 'is_powered' auf true steht (Ladegerät angeschlossen)
      - if:
          condition:
            and:
              - mqtt.connected:
              - switch.is_off: block_deep_sleep
              - switch.is_off: calibration_mode # Verhindert Deep Sleep während der Kalibrierung
              - lambda: 'return !id(is_powered);' # Verhindert Deep Sleep bei dauerhafter Stromversorgung
              # Nutzt den echten Hardware-Timer (millis) statt des Uptime-Sensors
              - lambda: 'return millis() > ${initial_boot_delay_ms};'
          then:
            - deep_sleep.enter: deep_sleep_ctrl

esp32:
  board: esp32dev
  framework:
    type: arduino
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# ==============================================================================
# MODUL 3: NETZWERK & SCHNITTSTELLEN
# ==============================================================================
wifi:
  networks:
    - ssid: ${wifi_ssid}
      password: ${wifi_password}
      bssid: ${wifi_bssid}

  power_save_mode: NONE
  fast_connect: true # Beschleunigt den Connect im Garten
  manual_ip:
    static_ip: ${manual_static_ip}
    gateway: ${manual_gateway}
    subnet: ${manual_subnet}
    dns1: ${manual_dns1}
    dns2: ${manual_dns2}

  # Fallback-WLAN für den Notfall (Hotspot am Handy)
  ap:
    ssid: "Garten-Fallback"
    password: "12345678"
# Captive Portal zwingend notwendig für funktionierendes Fallback-AP
captive_portal:

# mDNS aktivieren für die Erreichbarkeit via .local Namen
mdns:
  disabled: false

web_server:
  port: 80
  version: 3

logger:
  level: INFO

debug:

api:
  encryption:
    key: ${api_encryption_key}
  reboot_timeout: 5min

mqtt:
  broker: ${mqtt_broker}
  topic_prefix: ${devicename}

ota:
  - platform: esphome

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Berlin"
    servers:
      - "192.168.178.1"
      - "0.pool.ntp.org"
    # Garantiert, dass die Uhrzeit sofort nach dem Sync via WLAN gepusht wird (wichtig für Akkumodus)
    on_time_sync:
      then:
        - lambda: 'id(text_letztes_update).update();'

i2c:
  sda: 25
  scl: 26
  scan: false
  frequency: 100kHz

# ==============================================================================
# MODUL 4: STEUERUNG (SCHALTER & BUTTONS)
# ==============================================================================
#
# Deep Sleep Komponente
deep_sleep:
  id: deep_sleep_ctrl
  sleep_duration: ${deep_sleep_duration}
  wakeup_pin:
    number: 35
    inverted: true
    allow_other_uses: true

switch:
  # Virtueller Schalter um den Deep Sleep z.B. für OTA-Updates zu blockieren
  - platform: template
    name: "System: Wach bleiben (Deep Sleep)"
    icon: "mdi:sleep-off"
    id: block_deep_sleep
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config

  # Virtueller Schalter für den Kalibrierungsmodus
  - platform: template
    name: "System: Kalibrierungsmodus (Rohwerte)"
    icon: "mdi:compass-rose"
    id: calibration_mode
    optimistic: true
    restore_mode: ALWAYS_OFF
    entity_category: config

  # Physischer Schalter für die Stromversorgung der Sensoren
  - platform: gpio
    pin: ${sensor_power_pin}
    id: sensor_power
    name: "System: Stromversorgung Sensor"
    icon: "mdi:power-settings"
    restore_mode: ALWAYS_ON
    entity_category: config

binary_sensor:
  # Hardware-Taster auf dem Board, weckt den Chip auf
  - platform: gpio
    pin:
      number: 35
      inverted: true
      allow_other_uses: true
    name: "Steuerung: Wake-Taster"
    entity_category: config
    icon: "mdi:gesture-tap-button"

button:
  # Manueller Neustart-Knopf im Webinterface/MQTT
  - platform: restart
    name: "Steuerung: Neustart"
    entity_category: config

# ==============================================================================
# MODUL 5: PHYSISCHE & BERECHNETE SENSOREN
# ==============================================================================
sensor:
  # --- BODENSENSOREN ---
  # Analoger Sensor für die kapazitive Bodenfeuchte
  - platform: adc
    pin: 32
    name: "Boden: 1 Feuchte"
    id: soil_moisture
    icon: "mdi:water-percent"
    update_interval: 1s
    attenuation: 12db
    unit_of_measurement: "%"
    device_class: moisture
    # Triggert den Text-Sensor genau dann, wenn der Hardware-Wert frisch gefiltert gesendet wird
    on_value:
      then:
        - lambda: 'id(text_boden_status).update();'
    filters:
      - filter_out: .nan
      # Nutzt im Dauerbetrieb eine gleitende Auswertung basierend auf dem Status
      - lambda: |-
          if (id(calibration_mode).state) {
            return NAN;
          } else {
            float raw_dry = ${soil_moist_raw_dry};
            float raw_wet = ${soil_moist_raw_wet};
            float percent = (x - raw_dry) * (100.0 / (raw_wet - raw_dry));
            if (percent < 0.0) percent = 0.0;
            if (percent > 100.0) percent = 100.0;
            return percent;
          }
      # Einfacher Median-Filter, der einen stabilen Wert sendet.
      - median:
          window_size: ${med_1s_window}
          send_every: ${med_1s_send_every}
          send_first_at: ${med_1s_send_first}

  # Analoger Sensor für die elektrische Leitfähigkeit des Bodens (Düngergehalt)
  - platform: adc
    pin: 34
    name: "Boden: 3 Leitfaehigkeit (EC)"
    id: soil_ec
    icon: "mdi:lightning-bolt-outline"
    update_interval: 1s
    attenuation: 12db
    unit_of_measurement: "mS/cm"
    device_class: conductivity
    # ÄNDERUNG: Kaskaden-Trigger für Dünger Index
    on_value:
      then:
        - lambda: 'id(text_duenger_index).update();'
    filters:
      - filter_out: .nan
      - lambda: |-
          if (id(calibration_mode).state) {
            return NAN;
          } else {
            float r[] = {${soil_ec_raw_p0}, ${soil_ec_raw_p1}, ${soil_ec_raw_p2}, ${soil_ec_raw_p3}, ${soil_ec_raw_p4}};
            float t[] = {${soil_ec_target_p0}, ${soil_ec_target_p1}, ${soil_ec_target_p2}, ${soil_ec_target_p3}, ${soil_ec_target_p4}};

            if (x <= r[0]) return t[0];
            if (x >= r[4]) return t[4];

            for (int i = 0; i < 4; i++) {
              if (x >= r[i] && x <= r[i+1]) {
                return t[i] + (x - r[i]) * ((t[i+1] - t[i]) / (r[i+1] - r[i]));
              }
            }
            return 0.0;
          }
      - clamp:
          min_value: 0.0
      - median:
          window_size: ${med_1s_window}
          send_every: ${med_1s_send_every}
          send_first_at: ${med_1s_send_first}

  # --- KLIMASENSOREN ---
  # Temperatur- und Luftfeuchtigkeitssensor (On-Board)
  - platform: dht
    pin: 16
    model: DHT11
    temperature:
      name: "Klima: 1 Temperatur"
      id: dht_temp
      icon: "mdi:thermometer"
      # Temperatur triggert alle Klima-Templates, da Temp/Hum zeitgleich gelesen werden
      on_value:
        then:
          - lambda: |-
              id(taupunkt_value).update();
              id(vpd_value).update();
              id(abs_hum_value).update();
      filters:
        # Fehlerhafte Werte blockieren
        - filter_out: .nan
        # ÄNDERUNG: Nutzt den dynamischen, globalen Offset (Akkumodus vs. Dauerstrom)
        - lambda: "return x + id(current_temp_offset);"
        - lambda: |-
            if (x < ${temp_min} || x > ${temp_max}) {
              return {};
            }
            return x;
        # Median-Filter über die sauberen Werte
        - median:
            window_size: ${med_2s_window}
            send_every: ${med_2s_send_every}
            send_first_at: ${med_2s_send_first}
    humidity:
      name: "Klima: 2 Luftfeuchtigkeit (relativ)"
      id: dht_hum
      icon: "mdi:cloud-percent"
      filters:
        # 1. Fehlerhafte Werte blockieren
        - filter_out: .nan
        # 2. Unrealistische Ausreißer blockieren
        - lambda: |-
            if (x < ${hum_min} || x > ${hum_max}) {
              return {};
            }
            return x;
        # 3. Median-Filter über die sauberen Werte
        - median:
            window_size: ${med_2s_window}
            send_every: ${med_2s_send_every}
            send_first_at: ${med_2s_send_first}
    # Das minimal mögliche Intervall des DHT11 Sensors
    update_interval: 2s

  # Digitaler I2C Lichtsensor
  - platform: bh1750
    name: "Klima: 4 Lichtintensitaet"
    id: light_lux
    icon: "mdi:brightness-5"
    address: 0x23
    update_interval: 2s
    on_value:
      then:
        - lambda: 'id(text_licht_status).update();'
    filters:
      - filter_out: .nan
      # Filter vereinfacht
      - median:
          window_size: ${med_2s_window}
          send_every: ${med_2s_send_every}
          send_first_at: ${med_2s_send_first}
      # Kalibrierfaktor für das Garten-Gehäuse
      - multiply: 1.0
    unit_of_measurement: "lx"

# --- BERECHNETE KLIMA-WERTE ---
# Berechnet den Taupunkt (ab welcher Temperatur bildet sich Kondenswasser/Schimmelgefahr?)
  - platform: template
    name: "Klima: 6 Taupunkt"
    id: taupunkt_value
    icon: "mdi:water-thermometer"
    unit_of_measurement: "°C"
    # ÄNDERUNG: Polling abgestellt
    update_interval: never
    filters:
      - filter_out: .nan
    lambda: |-
      if (isnan(id(dht_temp).state) || isnan(id(dht_hum).state)) return NAN;
      float t = id(dht_temp).state;
      float h = id(dht_hum).state;
      // Magnus-Formel zur Taupunktberechnung
      float a = 17.271;
      float b = 237.7;
      float alpha = ((a * t) / (b + t)) + log(h / 100.0);
      return (b * alpha) / (a - alpha);

# Berechnet den VPD (Sättigungsdefizit - Wichtig für die Pflanzenatmung!)
  - platform: template
    name: "Klima: 7 VPD (Dampfdruckdefizit)"
    id: vpd_value
    icon: "mdi:leaf-circle-outline"
    unit_of_measurement: "kPa"
    update_interval: never
    # ÄNDERUNG: VPD Kaskade -> Wenn VPD neu berechnet ist, triggere direkt den Text-Status dazu
    on_value:
      then:
        - lambda: 'id(text_vpd_status).update();'
    filters:
      - filter_out: .nan
    lambda: |-
      if (isnan(id(dht_temp).state) || isnan(id(dht_hum).state)) return NAN;
      float t = id(dht_temp).state;
      float h = id(dht_hum).state;
      float svp = 0.61078 * exp((17.27 * t) / (t + 237.3)); // Sättigungsdampfdruck
      float avp = (svp * h) / 100.0;                        // Aktueller Dampfdruck
      return svp - avp;

# Berechnet den Luftfeuchtigkeitswert absolut)
  - platform: template
    name: "Klima: 3 Luftfeuchtigkeit (absolut)"
    id: abs_hum_value
    icon: "mdi:water"
    unit_of_measurement: "g/m³"
    update_interval: never
    filters:
      - filter_out: .nan
    lambda: |-
      if (isnan(id(dht_temp).state) || isnan(id(dht_hum).state)) return NAN;
      float t = id(dht_temp).state;
      float h = id(dht_hum).state;
      // Formel zur Berechnung der absoluten Feuchte aus Temp und rel. Feuchte
      return (6.112 * exp((17.67 * t) / (t + 243.5)) * h * 2.1674) / (273.15 + t);

# --- SYSTEM & ENERGIE ---
# Interner ADC für die Überwachung der 18650 Zelle
  - platform: adc
    pin: 33
    name: "Energie: 3 Akku Spannung"
    entity_category: diagnostic
    id: battery_voltage
    icon: "mdi:sine-wave"
    update_interval: 1s
    attenuation: 12db
    # Kaskaden-Trigger
    on_value:
      then:
        - lambda: 'id(text_akku_zustand).update();'
    filters:
      - filter_out: .nan
      # Hardware-Spannungsteiler auf dem Board erfordert Multiplikator
      - multiply: 2.0
      # Schnellere Filterung
      - median:
          window_size: ${med_1s_window}
          send_every: ${med_1s_send_every}
          send_first_at: ${med_1s_send_first}

# Virtueller Sensor zur Umrechnung der Akkuspannung in Prozent
  - platform: copy
    source_id: battery_voltage
    name: "Energie: 2 Akku Ladestand"
    entity_category: diagnostic
    icon: "mdi:battery"
    unit_of_measurement: "%"
    device_class: battery
    filters:
      - filter_out: .nan
      # Kalibrierung von Spannung zu Prozent (Lithium-Ionen Entladekurve grob angenähert)
      - calibrate_linear:
          - 3.51 -> 0.0 # weniger liefert falsche werte
          - 4.20 -> 100.0
      - clamp:
          min_value: 0.0
          max_value: 100.0
      # Median entfernt, da Quelle bereits U/min liefert. Ein weiterer Median würde die Ausgabe verzögern.

# Laufzeitüberwachung vor dem Deep Sleep
  - platform: uptime
    name: "System: 10 Betriebszeit"
    id: system_uptime
    # Uptime nutzt nun auch den Median-Filter für saubere Synchronisation!
    update_interval: 1s
    on_value:
      then:
        - lambda: 'id(text_letztes_update).update();'
    filters:
      - median:
          window_size: ${med_1s_window}
          send_every: ${med_1s_send_every}
          send_first_at: ${med_1s_send_first}

# WLAN Diagnosesensor
  - platform: wifi_signal
    name: "System: 09 WLAN Signalstaerke"
    icon: "mdi:wifi"
    update_interval: 1s
    filters:
      # Medianfilter hinzugefügt
      - median:
          window_size: ${med_1s_window}
          send_every: ${med_1s_send_every}
          send_first_at: ${med_1s_send_first}

# Zeigt den noch freien Arbeitsspeicher des ESP32 an
  - platform: debug
    free:
      name: "System: 03 Speicher Auslastung (RAM)"
      entity_category: diagnostic
      unit_of_measurement: "Bytes"
      icon: "mdi:memory"

# ==============================================================================
# MODUL 6: TEXT SENSOREN & AUSWERTUNGEN
# ==============================================================================
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "System: 06 IP-Adresse"
      icon: "mdi:ip-network"
    ssid:
      name: "System: 07 Verbindung (SSID)"
      icon: "mdi:router-network"
    # Gibt die MAC-Adresse des WLAN-Routers/Repeaters aus
    bssid:
      name: "System: 08 Verbindung (BSSID)"
      icon: "mdi:access-point-network"
    # Gibt die physische Adresse deines ESP32 aus
    mac_address:
      name: "System: 05 MAC-Adresse"
      icon: "mdi:chip"

  - platform: version
    name: "System: 01 ESPHome Version"

  - platform: template
    name: "System: 04 Hostname"
    id: text_hostname
    icon: "mdi:computer"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      return {"${devicename}"};

    # Zeigt an, ob das Board regulär aus dem Deep Sleep kam oder per Taster geweckt wurde
  - platform: debug
    reset_reason:
      name: "System: 02 Neustart-Grund"
      entity_category: diagnostic
      icon: "mdi:power-cycle"

  # Ein benutzerdefinierter Text-Sensor, der die Sensordaten auswertet
  - platform: template
    name: "Boden: 2 Status"
    id: text_boden_status
    icon: "mdi:sprout"
    # Keine Selbstaktualisierung mehr. Wird durch soil_moisture getriggert.
    update_interval: never
    lambda: |-
      if (id(calibration_mode).state) return {"KALIBRIERUNG AKTIV"}; // Status-Hinweis im Textsensor
      if (isnan(id(soil_moisture).state)) return {"Sensorfehler"};
      float m = id(soil_moisture).state;
      if (m < ${soil_moisture_dry}) return {"Zu trocken - Bitte gießen!"};
      if (m > ${soil_moisture_wet}) return {"Sehr nass"};
      return {"Optimal"};

  # Die klare Text-Auswertung für deinen VPD-Wert
  - platform: template
    name: "Klima: 8 VPD Status (Phase)"
    id: text_vpd_status
    icon: "mdi:cannabis"
    update_interval: never
    lambda: |-
      if (isnan(id(vpd_value).state)) return {"Fehler / Keine Daten"};
      float v = id(vpd_value).state;
      if (v < ${vpd_low}) return {"Zu niedrig (< " "${vpd_low}" " kPa)"};
      if (v < ${vpd_ideal_seed}) return {"Ideal für: Stecklinge & Keimung"};
      if (v <= ${vpd_ideal_veg_early}) return {"Ideal für: Stecklinge & Wachstum"};
      if (v <= ${vpd_ideal_veg_late}) return {"Ideal für: Wachstumsphase"};
      if (v <= ${vpd_ideal_flower}) return {"Ideal für: Blütephase"};
      return {"Zu hoch (Trockenstress!)"};

  # Gibt die aktuelle Uhrzeit aus
  - platform: template
    name: "System: 11 Letztes Update"
    id: text_letztes_update
    icon: "mdi:clock-check-outline"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      auto time = id(sntp_time).now();
      if (time.is_valid()) {
        // Formatiert die Zeit als: TT.MM.JJJJ HH:MM:SS
        return {time.strftime("%d.%m.%Y %H:%M:%S")};
      } else {
        return {"Warte auf Zeit-Sync..."};
      }

  - platform: template
    name: "Boden: 4 Duenger-Index (EC)"
    id: text_duenger_index
    icon: "mdi:flask-outline"
    update_interval: never
    lambda: |-
      if (id(calibration_mode).state) return {"KALIBRIERUNG AKTIV"}; // Status-Hinweis im Textsensor
      if (isnan(id(soil_ec).state)) return {"Fehler"};
      float ec = id(soil_ec).state;
      if (ec < ${soil_ec_low}) return {"Zu wenig Nährstoffe"};
      if (ec > ${soil_ec_high}) return {"Achtung: Überdüngt!"};
      return {"Optimal versorgt"};

  - platform: template
    name: "Klima: 5 Licht-Status"
    id: text_licht_status
    icon: "mdi:white-balance-sunny"
    update_interval: never
    lambda: |-
      if (isnan(id(light_lux).state)) return {"Fehler"};
      float lux = id(light_lux).state;
      if (lux < ${light_night}) return {"Nacht / Dunkelphase"};
      if (lux < ${light_seed}) return {"Schwach (Stecklinge/Sämlinge)"};
      if (lux < ${light_veg}) return {"Optimal für Wachstum (Veg)"};
      if (lux < ${light_flower}) return {"Intensiv (Blütephase)"};
      return {"Lichtstress / Sehr extrem!"};

  # Auswertung steuert hier aktiv die Systemvariablen für den Dauerstrombetrieb um!
  - platform: template
    name: "Energie: 1 Akku Zustand"
    id: text_akku_zustand
    entity_category: diagnostic
    icon: "mdi:battery-alert-variant-outline"
    update_interval: never
    lambda: |-
      if (isnan(id(battery_voltage).state)) return {"Fehler"};
      float v = id(battery_voltage).state;
      if (v > 4.3) {
        id(current_temp_offset) = ${temp_offset_powered};
        id(is_powered) = true;
        return {"Ladegerät angeschlossen"};
      } else {
        id(current_temp_offset) = ${temp_offset_battery};
        id(is_powered) = false;
        if (v > 4.0) return {"Vollständig geladen"};
        if (v > 3.7) return {"Gut"};
        if (v > 3.6) return {"Bald nachladen"};
        if (v > 3.5) return {"falsche Sensordaten"};
        return {"Kritisch leer!"};
      }

# ==============================================================================
# MODUL 7: INTERVALL-ROUTINEN (LOGGING)
# ==============================================================================
interval:
  # Loggt die unberührten Volt-Rohwerte der Sensoren direkt in
  # die Web-Konsole, sobald der Kalibrierungsmodus-Schalter umgelegt wird.
  - interval: 2s
    id: calibration_logger
    then:
      - if:
          condition:
            switch.is_on: calibration_mode
          then:
            - logger.log:
                level: INFO
                format: "--- KALIBRIERUNG AKTIV --- Feuchte: %.3f V | EC-Wert: %.3f V"
                # get_raw_state() holt den reinen Wert vor jeglicher Lambda/Filter-Berechnung
                args: [ 'id(soil_moisture).get_raw_state()', 'id(soil_ec).get_raw_state()' ]
